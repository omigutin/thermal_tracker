[app]
mode = "server"
scenario = "opencv_manual"
preset = "opencv_general"

[connections.frames]
reader = "shared_memory"
camera_count = 1
camera_id = 0
shared_memory_prefix = "thermal_tracker"
frame_width = 512
frame_height = 640
frame_channels = 1
frame_format = "raw_y8"

[connections.commands]
reader = "shared_memory"
shared_memory_prefix = "thermal_tracker"

[connections.results]
writer = "shared_memory"
shared_memory_prefix = "thermal_tracker"

[gui]
enabled = false

[model]
type = "none"
model_path = ""

[tracker]
config_path = ""

[history]
enabled = false
store = "null"
