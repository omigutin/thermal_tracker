# Migrated preset for stage-operation configuration format.
# Generated from legacy preset sections: preprocessing/global_motion/click_selection/etc.

[meta]
id = "opencv_clutter"
title = "OpenCV Crowded Scene"
tooltip = "Для групп целей, пересечений и похожих горячих объектов рядом."
description = """Подходит для сложной сцены с несколькими похожими целями.
Делает повторный захват строже и уменьшает риск перескока на соседа.
"""

[pipeline]
kind = "manual_click_classical"

[frame_preprocessing]
enabled = true

[[frame_preprocessing.operations]]
type = "resize"
enabled = true
target_width = 960

[[frame_preprocessing.operations]]
type = "gaussian_blur"
enabled = true
kernel = 5

[[frame_preprocessing.operations]]
type = "median_blur"
enabled = true
kernel = 3

[[frame_preprocessing.operations]]
type = "minmax_normalize"
enabled = true

[[frame_preprocessing.operations]]
type = "clahe_contrast"
enabled = true
clip_limit = 1.8
tile_grid_size = 8

[[frame_preprocessing.operations]]
type = "gradient"
enabled = true
blur_kernel = 3

[[frame_preprocessing.operations]]
type = "sharpness_metric"
enabled = true

[frame_stabilization]
enabled = true

[[frame_stabilization.operations]]
type = "phase_correlation"
enabled = true
downscale = 0.55
blur_kernel = 9
min_response = 0.035
max_shift_ratio = 0.32

[motion_localization]
enabled = true

[[motion_localization.operations]]
type = "mog2"
enabled = true

[candidate_formation]
enabled = true

[[candidate_formation.operations]]
type = "connected_components"
enabled = true

[candidate_filtering]
enabled = true

[[candidate_filtering.operations]]
type = "area_aspect"
enabled = true
min_area = 24
max_frame_fraction = 0.25
max_aspect_ratio = 6.0

[[candidate_filtering.operations]]
type = "border_touch"
enabled = true
border_margin = 2

[[candidate_filtering.operations]]
type = "contrast"
enabled = true
min_contrast = 5.0
border = 6
min_background_pixels = 10

[target_selection]
enabled = true

[[target_selection.operations]]
type = "contrast_component"
enabled = true
search_radius = 100
similarity_sigma = 1.5
local_window_radius = 6
min_tolerance = 12
max_tolerance = 48
min_component_area = 40
max_component_fill = 0.3
max_patch_span_ratio = 0.65
max_refine_growth = 1.5
retry_scale = 1.8
max_retry_radius = 220
padding = 10
fallback_size = 40
expansion_margin = 16
background_ring = 12
foreground_fraction = 0.4
min_object_contrast = 4.0
max_expanded_fill = 0.55
max_expansion_ratio = 4.8

[target_tracking]
enabled = true

[[target_tracking.operations]]
type = "template_point"
enabled = true
min_box_size = 12
search_margin = 28
point_search_margin = 12
lost_search_growth = 20
full_frame_after = 70
max_lost_frames = 90
track_threshold = 0.46
reacquire_threshold = 0.57
template_update_threshold = 0.66
scales = [0.85, 0.94, 1.0, 1.08, 1.16]
distance_penalty = 0.26
template_alpha = 0.08
velocity_alpha = 0.4
max_tracking_center_shift = 1.2
max_reacquire_center_shift = 2.0
reacquire_center_growth = 0.22
max_size_shrink = 0.78
max_size_growth = 1.2
max_size_shrink_on_reacquire = 0.6
max_size_growth_on_reacquire = 1.45
max_size_growth_from_initial = 2.5
edge_exit_max_lost_frames = 3
edge_exit_margin = 10
max_feature_points = 48
min_feature_points = 8
feature_quality_level = 0.02
feature_min_distance = 7
feature_refresh_interval = 6
blur_hold_enabled = true
blur_sharpness_drop_ratio = 0.52
blur_hold_max_frames = 60
blur_hold_center_growth = 0.05

[target_recovery]
enabled = true
min_lost_frames = 8
confirm_frames = 4
recovery_window_frames = 40

[[target_recovery.operations]]
type = "local_template"
enabled = true
search_padding = 50
search_padding_growth = 6
scales = [0.84, 0.94, 1.0, 1.08, 1.18]
match_threshold = 0.6
template_alpha = 0.1

[visualization]
show_search_region = true
show_predicted_box = true
show_global_motion = true
line_thickness = 2
