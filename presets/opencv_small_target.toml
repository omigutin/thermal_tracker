# Migrated preset for stage-operation configuration format.
# Generated from legacy preset sections: preprocessing/global_motion/click_selection/etc.

[meta]
id = "opencv_small_target"
title = "OpenCV Small Target"
tooltip = "Для маленьких и относительно изолированных целей."
description = """Лучше работает на компактных объектах, которые занимают мало пикселей.
Держит более компактный поиск и аккуратнее относится к размеру рамки.
"""

[pipeline]
kind = "manual_click_classical"

[frame_preprocessing]
enabled = true

[[frame_preprocessing.operations]]
type = "resize"
enabled = true
target_width = 960

[[frame_preprocessing.operations]]
type = "gaussian_blur"
enabled = true
kernel = 3

[[frame_preprocessing.operations]]
type = "median_blur"
enabled = true
kernel = 3

[[frame_preprocessing.operations]]
type = "minmax_normalize"
enabled = true

[[frame_preprocessing.operations]]
type = "clahe_contrast"
enabled = true
clip_limit = 2.4
tile_grid_size = 8

[[frame_preprocessing.operations]]
type = "gradient"
enabled = true
blur_kernel = 3

[[frame_preprocessing.operations]]
type = "sharpness_metric"
enabled = true

[frame_stabilization]
enabled = true

[[frame_stabilization.operations]]
type = "phase_correlation"
enabled = true
downscale = 0.5
blur_kernel = 7
min_response = 0.025
max_shift_ratio = 0.4

[motion_localization]
enabled = true

[[motion_localization.operations]]
type = "mog2"
enabled = true

[candidate_formation]
enabled = true

[[candidate_formation.operations]]
type = "connected_components"
enabled = true

[candidate_filtering]
enabled = true

[[candidate_filtering.operations]]
type = "area_aspect"
enabled = true
min_area = 24
max_frame_fraction = 0.25
max_aspect_ratio = 6.0

[[candidate_filtering.operations]]
type = "border_touch"
enabled = true
border_margin = 2

[[candidate_filtering.operations]]
type = "contrast"
enabled = true
min_contrast = 5.0
border = 6
min_background_pixels = 10

[target_selection]
enabled = true

[[target_selection.operations]]
type = "contrast_component"
enabled = true
search_radius = 60
similarity_sigma = 1.6
local_window_radius = 4
min_tolerance = 8
max_tolerance = 55
min_component_area = 10
max_component_fill = 0.35
max_patch_span_ratio = 0.8
max_refine_growth = 1.35
retry_scale = 1.5
max_retry_radius = 120
padding = 3
fallback_size = 12
expansion_margin = 14
background_ring = 8
foreground_fraction = 0.55
min_object_contrast = 5.0
max_expanded_fill = 0.28
max_expansion_ratio = 2.2

[target_tracking]
enabled = true

[[target_tracking.operations]]
type = "template_point"
enabled = true
min_box_size = 8
search_margin = 18
point_search_margin = 10
lost_search_growth = 12
full_frame_after = 999
max_lost_frames = 30
track_threshold = 0.43
reacquire_threshold = 0.52
template_update_threshold = 0.6
scales = [0.72, 0.84, 0.94, 1.0, 1.08, 1.18]
distance_penalty = 0.12
template_alpha = 0.1
velocity_alpha = 0.35
max_tracking_center_shift = 1.65
max_reacquire_center_shift = 2.9
reacquire_center_growth = 0.34
max_size_shrink = 0.65
max_size_growth = 1.18
max_size_shrink_on_reacquire = 0.5
max_size_growth_on_reacquire = 1.35
max_size_growth_from_initial = 1.5
edge_exit_max_lost_frames = 4
edge_exit_margin = 10
max_feature_points = 28
min_feature_points = 4
feature_quality_level = 0.015
feature_min_distance = 4
feature_refresh_interval = 5
blur_hold_enabled = true
blur_sharpness_drop_ratio = 0.6
blur_hold_max_frames = 30
blur_hold_center_growth = 0.05

[target_recovery]
enabled = true
min_lost_frames = 3
confirm_frames = 5
recovery_window_frames = 50

[[target_recovery.operations]]
type = "local_template"
enabled = true
search_padding = 30
search_padding_growth = 4
scales = [0.85, 0.93, 1.0, 1.08, 1.15]
match_threshold = 0.62
template_alpha = 0.08

[visualization]
show_search_region = true
show_predicted_box = true
show_global_motion = true
line_thickness = 1
