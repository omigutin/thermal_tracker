# Пресет для маленькой цели.
# Нужен там, где объект занимает мало пикселей и легко теряется на фоне.

[meta]
# Техническое имя пресета, по которому он выбирается в коде и в CLI.
id = "opencv_small_target"
# Короткое название для GUI.
title = "OpenCV Small Target"
# Очень короткая подсказка для hover и компактных мест интерфейса.
tooltip = "Для маленьких и относительно изолированных целей."
# Человеческое описание, когда именно этот пресет стоит брать.
description = """
Лучше работает на компактных объектах, которые занимают мало пикселей.
Держит более компактный поиск и аккуратнее относится к размеру рамки.
"""

[pipeline]
# Явно говорим, какой сценарий должен быть собран для этого пресета.
kind = "manual_click_classical"

[candidate_filtering]
filters = ["area_aspect", "border_touch", "contrast"]

[moving_area_detection]
method = "opencv_mog2"

[target_candidate_extraction]
method = "opencv_connected_components"

[target_recovery]
method = "local_template"

[preprocessing]
method = "thermal"
# Если кадр слишком широкий, уменьшаем его до этой ширины перед обработкой.
resize_width = 960
# Размер гауссова размытия для мягкого подавления обычного шума.
gaussian_kernel = 3
# Размер медианного фильтра против одиночных пиксельных всплесков.
median_kernel = 3
# Насколько агрессивно CLAHE усиливает локальный контраст.
clahe_clip_limit = 2.4
# На сколько плиток делим кадр для работы CLAHE.
clahe_tile_grid_size = 8
# Отдельное сглаживание перед расчётом карты градиентов.
gradient_blur_kernel = 3

[global_motion]
method = "opencv_phase_correlation"
# Включать ли оценку общего движения камеры.
enabled = true
# Во сколько раз уменьшать кадр перед phase correlation.
downscale = 0.5
# Размер сглаживания перед оценкой глобального сдвига.
blur_kernel = 7
# Минимальная надёжность ответа, ниже которой сдвиг считаем сомнительным.
min_response = 0.025
# Максимальный допустимый сдвиг как доля размера кадра.
max_shift_ratio = 0.4

[click_selection]
method = "opencv_click"
# Радиус первичного поиска объекта вокруг точки клика.
search_radius = 60
# Насколько широко разрешаем разброс яркости вокруг пикселя клика.
similarity_sigma = 1.6
# Радиус локального окна для оценки местной статистики.
local_window_radius = 4
# Нижняя граница допуска по яркости при сегментации.
min_tolerance = 8
# Верхняя граница допуска по яркости при сегментации.
max_tolerance = 55
# Минимальная площадь компоненты, которую считаем объектом.
min_component_area = 10
# Максимальная доля патча, которую может занять одна компонента без подозрений.
max_component_fill = 0.35
# Насколько компоненте можно расползтись по ширине или высоте патча.
max_patch_span_ratio = 0.8
# Во сколько раз уточнение может расширить уже найденный bbox.
max_refine_growth = 1.35
# Во сколько раз увеличиваем радиус, если первая попытка выбора не удалась.
retry_scale = 1.5
# Предельный радиус повторной попытки выбора цели.
max_retry_radius = 120
# Сколько пикселей добавляем вокруг найденного объекта.
padding = 3
# Размер запасного бокса, если сегментация совсем не удалась.
fallback_size = 12
# Запас вокруг ядра при попытке расширить его до целого объекта.
expansion_margin = 14
# Толщина внешнего кольца фона для оценки контраста.
background_ring = 8
# Доля контраста, по которой строим порог объекта относительно фона.
foreground_fraction = 0.55
# Минимальный контраст объекта к фону для уверенного расширения.
min_object_contrast = 5.0
# Максимальная доля рабочей области, которую может занять расширенный объект.
max_expanded_fill = 0.28
# Во сколько раз расширенный объект может быть больше исходного ядра.
max_expansion_ratio = 2.2

[tracking]
method = "opencv_template_point"
# Запас вокруг предсказанной позиции при обычном поиске.
search_margin = 18
# На сколько расширяем область поиска, когда цель начала теряться.
lost_search_growth = 12
# После скольких пропусков разрешаем почти полный поиск по кадру.
full_frame_after = 999
# Сколько кадров подряд можно терпеть потерю цели.
max_lost_frames = 45
# Какие масштабы бокса перебираем при сопоставлении шаблона.
scales = [0.72, 0.84, 0.94, 1.0, 1.08, 1.18]
# Минимальный порог совпадения для обычного сопровождения.
track_threshold = 0.43
# Минимальный порог совпадения для повторного захвата.
reacquire_threshold = 0.52
# Порог уверенности, после которого разрешаем обновить шаблон цели.
template_update_threshold = 0.6
# Скорость обновления адаптивного шаблона цели.
template_alpha = 0.1
# Насколько сильно учитываем новую оценку скорости цели.
velocity_alpha = 0.35
# Самый маленький допустимый размер бокса.
min_box_size = 8
# Штраф за кандидатов, которые слишком далеко от предсказанного центра.
distance_penalty = 0.12
# Максимально допустимый рост бокса за один обычный шаг.
max_size_growth = 1.18
# Максимально допустимое сжатие бокса за один обычный шаг.
max_size_shrink = 0.65
# Насколько можно увеличить бокс при повторном захвате.
max_size_growth_on_reacquire = 1.35
# Жёсткий потолок от стартового размера: маленькая цель не должна превращаться в кусок облака.
max_size_growth_from_initial = 1.5
# Насколько можно уменьшить бокс при повторном захвате.
max_size_shrink_on_reacquire = 0.5
# Верхняя граница числа опорных точек для LK-трекинга.
max_feature_points = 28
# Нижняя граница числа опорных точек, ниже которой пора переинициализироваться.
min_feature_points = 4
# Порог качества углов при поиске опорных точек.
feature_quality_level = 0.015
# Минимальная дистанция между опорными точками.
feature_min_distance = 4
# Как часто полностью обновлять набор опорных точек.
feature_refresh_interval = 5
# Дополнительный запас вокруг бокса для поиска новых точек.
point_search_margin = 10
# Максимальный сдвиг центра в обычном режиме как доля размера объекта.
max_tracking_center_shift = 1.65
# Максимальный сдвиг центра при повторном захвате.
max_reacquire_center_shift = 2.9
# Как быстро расширяем допуск по центру, если потеря затягивается.
reacquire_center_growth = 0.34
edge_exit_margin = 10
edge_exit_max_lost_frames = 4
# При длительном замутнении не сбрасываем цель сразу, а держим прогноз движения.
blur_hold_enabled = true
# Если резкость центральной части кадра просела сильнее этой доли, считаем кадр плохим.
blur_sharpness_drop_ratio = 0.58
# Дополнительный бюджет кадров для восстановления после замутнения.
blur_hold_max_frames = 70
# Дополнительное расширение допуска по центру после плохих кадров.
blur_hold_center_growth = 0.075

[visualization]
# Показывать ли на кадре область текущего поиска.
show_search_region = true
# Показывать ли предсказанный бокс до подтверждения совпадения.
show_predicted_box = true
# Показывать ли служебную информацию о движении камеры.
show_global_motion = true
# Толщина линий при рисовании боксов и служебных рамок.
line_thickness = 1
