# Migrated preset for stage-operation configuration format.
# Generated from legacy preset sections: preprocessing/global_motion/click_selection/etc.

[meta]
id = "opencv_auto_motion"
title = "OpenCV Auto Motion"
tooltip = "Автоматическое обнаружение движущихся объектов без ручного выбора цели."
description = """Автоматический режим: обнаруживает все движущиеся объекты через MOG2 и фильтрует кандидатов.
Не требует клика оператора. Используй как детектор сцены или основу для multi-target контура.
"""

[pipeline]
kind = "auto_motion_tracking"

[frame_preprocessing]
enabled = true

[[frame_preprocessing.operations]]
type = "resize"
enabled = true
target_width = 960

[[frame_preprocessing.operations]]
type = "gaussian_blur"
enabled = true
kernel = 5

[[frame_preprocessing.operations]]
type = "median_blur"
enabled = true
kernel = 3

[[frame_preprocessing.operations]]
type = "minmax_normalize"
enabled = true

[[frame_preprocessing.operations]]
type = "clahe_contrast"
enabled = true
clip_limit = 2.0
tile_grid_size = 8

[[frame_preprocessing.operations]]
type = "gradient"
enabled = true
blur_kernel = 3

[[frame_preprocessing.operations]]
type = "sharpness_metric"
enabled = true

[frame_stabilization]
enabled = true

[[frame_stabilization.operations]]
type = "phase_correlation"
enabled = true
downscale = 0.5
blur_kernel = 9
min_response = 0.2
max_shift_ratio = 0.35

[motion_localization]
enabled = true

[[motion_localization.operations]]
type = "mog2"
enabled = true

[candidate_formation]
enabled = true

[[candidate_formation.operations]]
type = "connected_components"
enabled = true

[candidate_filtering]
enabled = true

[[candidate_filtering.operations]]
type = "area_aspect"
enabled = true
min_area = 24
max_frame_fraction = 0.25
max_aspect_ratio = 6.0

[[candidate_filtering.operations]]
type = "border_touch"
enabled = true
border_margin = 2

[[candidate_filtering.operations]]
type = "contrast"
enabled = true
min_contrast = 5.0
border = 6
min_background_pixels = 10

[target_selection]
enabled = true

[[target_selection.operations]]
type = "contrast_component"
enabled = true
search_radius = 96
similarity_sigma = 1.55
local_window_radius = 5
min_tolerance = 10
max_tolerance = 56
min_component_area = 12
max_component_fill = 0.55
max_patch_span_ratio = 0.85
max_refine_growth = 1.8
retry_scale = 1.6
max_retry_radius = 180
padding = 5
fallback_size = 20
expansion_margin = 24
background_ring = 12
foreground_fraction = 0.42
min_object_contrast = 5.0
max_expanded_fill = 0.6
max_expansion_ratio = 8.0

[target_tracking]
enabled = false

[target_recovery]
enabled = true
min_lost_frames = 5
confirm_frames = 3
recovery_window_frames = 30

[[target_recovery.operations]]
type = "local_template"
enabled = true
search_padding = 60
search_padding_growth = 8
scales = [0.84, 0.94, 1.0, 1.08, 1.18]
match_threshold = 0.5
template_alpha = 0.12

[visualization]
show_search_region = false
show_predicted_box = false
show_global_motion = true
line_thickness = 1
