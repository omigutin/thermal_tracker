# Автоматический нейросетевой режим, где модель сама ищет все цели на каждом кадре.
# Этот пресет нужен, когда хотим быстро проверить, что YOLO видит без ручного клика.

[meta]
id = "yolo_auto"
title = "YOLO Auto"
tooltip = "Автоматический режим: нейросеть сама ищет все объекты."
description = """
Подходит для сценария, где не нужно кликать по цели.
Модель сама прогоняет каждый кадр и показывает все найденные объекты.
Хорош как быстрый просмотр возможностей датасета и модели без ручного single-target режима.
"""

[pipeline]
kind = "auto_neural_detection"

[preprocessing]
# Минимальная цепочка для neural-режима без CLAHE и blur.
methods = [
    "resize",
    "normalize_minmax",
    "gradient",
    "sharpness_metric",
]
resize_width = 960
gaussian_kernel = 1
median_kernel = 1
clahe_clip_limit = 2.0
clahe_tile_grid_size = 8
gradient_blur_kernel = 1

[global_motion]
method = "opencv_phase_correlation"
enabled = true
downscale = 0.5
blur_kernel = 9
min_response = 0.03
max_shift_ratio = 0.35

[click_selection]
method = "opencv_click"
search_radius = 100
similarity_sigma = 1.35
local_window_radius = 5
min_tolerance = 10
max_tolerance = 42
min_component_area = 30
max_component_fill = 0.45
max_patch_span_ratio = 0.85
max_refine_growth = 1.8
retry_scale = 1.6
max_retry_radius = 180
padding = 8
fallback_size = 36
expansion_margin = 18
background_ring = 10
foreground_fraction = 0.36
min_object_contrast = 6.0
max_expanded_fill = 0.58
max_expansion_ratio = 5.5

[yolo_tracking]
search_margin = 30
lost_search_growth = 26
max_lost_frames = 90
[visualization]
show_search_region = false
show_predicted_box = false
show_global_motion = true
line_thickness = 2

[neural]
engine_name = "ultralytics_yolo"
model_path = "models/drone_detect_v26n_100_28042026.pt"
tracker_config_path = "trackers/bytetrack.yaml"
confidence_threshold = 0.20
iou_threshold = 0.45
allowed_classes = []
device = ""
max_reacquire_distance_factor = 2.6
prefer_same_class = true
