# Migrated preset for stage-operation configuration format.
# Generated from legacy preset sections: preprocessing/global_motion/click_selection/etc.

[meta]
id = "opencv_general"
title = "OpenCV General"
tooltip = "Базовый универсальный профиль для контрастных целей разного размера."
description = """Подходит как отправная точка, когда сцена ещё не изучена.
Старается выделять контрастный объект целиком и сопровождать его через умеренные сдвиги камеры.
"""

[pipeline]
kind = "manual_click_classical"

[frame_preprocessing]
enabled = true

[[frame_preprocessing.operations]]
type = "resize"
enabled = true
target_width = 960

[[frame_preprocessing.operations]]
type = "gaussian_blur"
enabled = true
kernel = 5

[[frame_preprocessing.operations]]
type = "median_blur"
enabled = true
kernel = 3

[[frame_preprocessing.operations]]
type = "minmax_normalize"
enabled = true

[[frame_preprocessing.operations]]
type = "clahe_contrast"
enabled = true
clip_limit = 2.0
tile_grid_size = 8

[[frame_preprocessing.operations]]
type = "gradient"
enabled = true
blur_kernel = 3

[[frame_preprocessing.operations]]
type = "sharpness_metric"
enabled = true

[frame_stabilization]
enabled = true

[[frame_stabilization.operations]]
type = "phase_correlation"
enabled = true
downscale = 0.5
blur_kernel = 9
min_response = 0.2
max_shift_ratio = 0.35

[motion_localization]
enabled = true

[[motion_localization.operations]]
type = "mog2"
enabled = true

[candidate_formation]
enabled = true

[[candidate_formation.operations]]
type = "connected_components"
enabled = true

[candidate_filtering]
enabled = true

[[candidate_filtering.operations]]
type = "area_aspect"
enabled = true
min_area = 24
max_frame_fraction = 0.25
max_aspect_ratio = 6.0

[[candidate_filtering.operations]]
type = "border_touch"
enabled = true
border_margin = 2

[[candidate_filtering.operations]]
type = "contrast"
enabled = true
min_contrast = 5.0
border = 6
min_background_pixels = 10

[target_selection]
enabled = true

[[target_selection.operations]]
type = "contrast_component"
enabled = true
search_radius = 96
similarity_sigma = 1.55
local_window_radius = 5
min_tolerance = 10
max_tolerance = 56
min_component_area = 12
max_component_fill = 0.55
max_patch_span_ratio = 0.85
max_refine_growth = 1.8
retry_scale = 1.6
max_retry_radius = 180
padding = 5
fallback_size = 20
expansion_margin = 24
background_ring = 12
foreground_fraction = 0.42
min_object_contrast = 5.0
max_expanded_fill = 0.6
max_expansion_ratio = 8.0

[target_tracking]
enabled = true

[[target_tracking.operations]]
type = "template_point"
enabled = true
min_box_size = 8
search_margin = 24
point_search_margin = 14
lost_search_growth = 18
full_frame_after = 999
max_lost_frames = 70
track_threshold = 0.42
reacquire_threshold = 0.5
template_update_threshold = 0.62
scales = [0.72, 0.84, 0.94, 1.0, 1.08, 1.18, 1.32]
distance_penalty = 0.14
template_alpha = 0.12
velocity_alpha = 0.45
max_tracking_center_shift = 1.6
max_reacquire_center_shift = 2.8
reacquire_center_growth = 0.32
max_size_shrink = 0.72
max_size_growth = 1.25
max_size_shrink_on_reacquire = 0.55
max_size_growth_on_reacquire = 1.6
max_size_growth_from_initial = 4.0
edge_exit_max_lost_frames = 4
edge_exit_margin = 10
max_feature_points = 40
min_feature_points = 6
feature_quality_level = 0.02
feature_min_distance = 6
feature_refresh_interval = 6
blur_hold_enabled = true
blur_sharpness_drop_ratio = 0.5
blur_hold_max_frames = 120
blur_hold_center_growth = 0.06

[target_recovery]
enabled = true
min_lost_frames = 5
confirm_frames = 3
recovery_window_frames = 30

[[target_recovery.operations]]
type = "local_template"
enabled = true
search_padding = 60
search_padding_growth = 8
scales = [0.84, 0.94, 1.0, 1.08, 1.18]
match_threshold = 0.5
template_alpha = 0.12

[visualization]
show_search_region = true
show_predicted_box = true
show_global_motion = true
line_thickness = 1
