# Migrated preset for stage-operation configuration format.
# Generated from legacy preset sections: preprocessing/global_motion/click_selection/etc.

[meta]
id = "yolo_general"
title = "YOLO General"
tooltip = "Нейросетевой режим: YOLO + ByteTrack."
description = """Использует готовую YOLO-модель и внешний tracker-конфиг для сопровождения целей.
Хорош как быстрый neural baseline, когда хочется проверить, справится ли модель
сама без основного classical single-target контура.
"""

[pipeline]
kind = "manual_click_neural"

[frame_preprocessing]
enabled = true

[[frame_preprocessing.operations]]
type = "resize"
enabled = true
target_width = 960

[[frame_preprocessing.operations]]
type = "minmax_normalize"
enabled = true

[[frame_preprocessing.operations]]
type = "gradient"
enabled = true
blur_kernel = 1

[[frame_preprocessing.operations]]
type = "sharpness_metric"
enabled = true

[frame_stabilization]
enabled = true

[[frame_stabilization.operations]]
type = "phase_correlation"
enabled = true
downscale = 0.5
blur_kernel = 9
min_response = 0.03
max_shift_ratio = 0.35

[motion_localization]
enabled = false

[candidate_formation]
enabled = false

[candidate_filtering]
enabled = false

[target_selection]
enabled = true

[[target_selection.operations]]
type = "contrast_component"
enabled = true
search_radius = 100
similarity_sigma = 1.35
local_window_radius = 5
min_tolerance = 10
max_tolerance = 42
min_component_area = 30
max_component_fill = 0.45
max_patch_span_ratio = 0.85
max_refine_growth = 1.8
retry_scale = 1.6
max_retry_radius = 180
padding = 8
fallback_size = 36
expansion_margin = 18
background_ring = 10
foreground_fraction = 0.36
min_object_contrast = 6.0
max_expanded_fill = 0.58
max_expansion_ratio = 5.5

[target_tracking]
enabled = true

[[target_tracking.operations]]
type = "yolo"
enabled = true
max_lost_frames = 90
search_margin = 30
lost_search_growth = 26
max_reacquire_distance_factor = 2.6
prefer_same_class = true
click_search_radius = 100

[target_recovery]
enabled = false

[neural]
engine_name = "ultralytics_yolo"
model_path = "models/drone_detect_v26n_100_28042026.pt"
tracker_config_path = "trackers/bytetrack.yaml"
confidence_threshold = 0.2
iou_threshold = 0.45
allowed_classes = []
device = ""
max_reacquire_distance_factor = 2.6
prefer_same_class = true

[visualization]
show_search_region = true
show_predicted_box = true
show_global_motion = true
line_thickness = 2
