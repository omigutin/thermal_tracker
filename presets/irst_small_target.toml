# Пресет для маленькой тепловой цели на базе IRST-трекера.
#
# IRST — Infrared Search and Track / инфракрасный поиск и сопровождение.
# Вместо сопоставления шаблонов (template matching) и оптического потока (LK optical flow)
# ищет контрастный blob в локальном окне. Позиция измеряется центроидом blob,
# движение предсказывается фильтром Калмана с моделью постоянной скорости.
#
# Рекомендуется для сценариев:
# - малый объект (≤ 200px² blob-площадь);
# - видимые изменения резкости / поворот камеры во время слежения;
# - фон с текстурами, на которых шаблон плавает.

[meta]
id = "irst_small_target"
title = "IRST Small Target"
tooltip = "IRST-трекер для маленьких тепловых объектов."
description = """
Основан на детекторе локального контраста + фильтре Калмана.
Не использует шаблоны, LK optical flow и phase correlation.
Лучше работает при замутнении, повороте камеры и малом размере цели.
"""

[pipeline]
kind = "manual_click_classical"

[frame_preprocessing]
enabled = true

[[frame_preprocessing.operations]]
type = "resize"
enabled = true
target_width = 960

[[frame_preprocessing.operations]]
type = "gaussian_blur"
enabled = true
kernel = 3

[[frame_preprocessing.operations]]
type = "median_blur"
enabled = true
kernel = 3

[[frame_preprocessing.operations]]
type = "minmax_normalize"
enabled = true

[[frame_preprocessing.operations]]
type = "clahe_contrast"
enabled = true
clip_limit = 2.0
tile_grid_size = 8

[[frame_preprocessing.operations]]
type = "sharpness_metric"
enabled = true

[frame_stabilization]
enabled = true

[[frame_stabilization.operations]]
type = "phase_correlation"
enabled = true
downscale = 0.5
blur_kernel = 7
min_response = 0.025
max_shift_ratio = 0.4

[motion_localization]
enabled = true

[[motion_localization.operations]]
type = "mog2"
enabled = true

[candidate_formation]
enabled = true

[[candidate_formation.operations]]
type = "connected_components"
enabled = true

[candidate_filtering]
enabled = true

[[candidate_filtering.operations]]
type = "area_aspect"
enabled = true
min_area = 24
max_frame_fraction = 0.25
max_aspect_ratio = 6.0

[[candidate_filtering.operations]]
type = "border_touch"
enabled = true
border_margin = 2

[[candidate_filtering.operations]]
type = "contrast"
enabled = true
min_contrast = 5.0
border = 6
min_background_pixels = 10

[target_selection]
enabled = true

[[target_selection.operations]]
type = "contrast_component"
enabled = true
search_radius = 60
similarity_sigma = 1.5
local_window_radius = 5
min_tolerance = 8
max_tolerance = 50
min_component_area = 10
max_component_fill = 0.45
max_patch_span_ratio = 0.85
max_refine_growth = 1.5
retry_scale = 1.5
max_retry_radius = 120
padding = 4
fallback_size = 12
expansion_margin = 14
background_ring = 8
foreground_fraction = 0.5
min_object_contrast = 5.0
max_expanded_fill = 0.35
max_expansion_ratio = 3.0

[target_tracking]
enabled = true

[[target_tracking.operations]]
type = "irst_contrast"
enabled = true
click_search_radius = 50
click_fallback_size = 10
filter_kernel = 3
background_kernel = 11
contrast_threshold = 12.0
min_blob_area = 1
max_blob_area = 200
min_gate = 20
max_gate = 100
gate_growth = 3
max_speed_px_per_frame = 6.0
max_lost_frames = 30
kalman_process_noise_pos = 0.5
kalman_process_noise_vel = 2.0
kalman_measurement_noise = 1.5
blur_hold_enabled = true
blur_sharpness_drop_ratio = 0.6

[target_recovery]
enabled = true
min_lost_frames = 3
confirm_frames = 3
recovery_window_frames = 45

[[target_recovery.operations]]
type = "irst_contrast"
enabled = true
search_padding = 40
search_padding_growth = 5
max_speed_px_per_frame = 6.0
contrast_threshold = 12.0
min_blob_area = 1
max_blob_area = 200
filter_kernel = 3
background_kernel = 11

[visualization]
show_search_region = true
show_predicted_box = true
show_global_motion = true
line_thickness = 1
